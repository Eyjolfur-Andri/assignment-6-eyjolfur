name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, local, kind]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: docker build -t app:${{ env.IMAGE_TAG }} .

      - name: Load image into Kind
        run: |
          kind load docker-image app:${{ env.IMAGE_TAG }} --name assignment-5

      - name: Update deployment manifest
        run: |
          sed -i '' "s|IMAGE_TAG|${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml

      - name: Deploy to cluster
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/app --timeout=60s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=app
          echo "App available at http://localhost:30080"
